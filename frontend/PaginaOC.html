<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuellaSegura - Recuperar Contraseña</title>
    <link rel="stylesheet" href="../diseños/style.css">
</head>
<body>
    <div class="contenedor">
        <h1>Recuperar Acceso 🐾</h1>
        <p class="subtitle">Ingresa tu correo para recibir un código</p>
        
        <form>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="number" placeholder="Código de verificación" class="hidden" id="codigo-input">
            <button type="submit" class="btn-primary">Enviar Código</button>
        </form>
        
        <a href="Login.html"><button type="button" class="btn-secondary">Volver al Inicio</button></a>
    </div>
</body>
</html>
